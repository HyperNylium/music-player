name: Lint test

on:
  push:
    branches: [ master, dev ]
    paths:
      - "*.py"
      - "**/*.py"
      - "*.pyw"
      - "**/*.pyw"
  pull_request:
    branches: [ master, dev ]
    paths:
      - "*.py"
      - "**/*.py"
      - "*.pyw"
      - "**/*.pyw"

jobs:
  ruff-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/ruff-action@v4.1.0
        with:
          version: "latest"
          args: check .
